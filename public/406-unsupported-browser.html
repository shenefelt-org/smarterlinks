<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>406 - Not Acceptable</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #f0e6ff 0%, #e6d9f0 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .container-error {
      text-align: center;
      background: white;
      border-radius: 20px;
      padding: 3rem 2rem;
      box-shadow: 0 10px 40px rgba(157, 132, 183, 0.15);
      max-width: 500px;
    }

    .hero-octopus-container {
      position: relative;
      width: 120px;
      height: 140px;
      margin: 0 auto 1rem auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: float 3s ease-in-out infinite;
    }

    .octo-head {
      width: 90px;
      height: 80px;
      background: #c8b6ff;
      border-radius: 45px 45px 18px 18px;
      position: relative;
      box-shadow: inset -6px -6px 0 rgba(157, 132, 183, 0.3);
      z-index: 2;
    }

    .octo-eye {
      width: 16px;
      height: 16px;
      background: #ffffff;
      border-radius: 50%;
      position: absolute;
      top: 40px;
      box-shadow: 0 2px 4px rgba(157, 132, 183, 0.2);
    }

    .octo-eye::after {
      content: '';
      position: absolute;
      width: 7px;
      height: 7px;
      background: #9d84b7;
      border-radius: 50%;
      top: 5px;
      right: 2px;
    }

    .eye-left {
      left: 20px;
    }

    .eye-right {
      right: 20px;
    }

    .octo-tentacles {
      display: flex;
      gap: 6px;
      margin-top: -12px;
      z-index: 1;
    }

    .tentacle {
      width: 16px;
      background: #c8b6ff;
      border-radius: 10px;
      box-shadow: inset -2px -2px 0 rgba(157, 132, 183, 0.3);
      transform-origin: top center;
      animation: swim 1.5s ease-in-out infinite alternate;
    }

    .t1 {
      animation-delay: 0.0s;
      height: 36px;
    }

    .t2 {
      animation-delay: 0.2s;
      height: 44px;
    }

    .t3 {
      animation-delay: 0.4s;
      height: 44px;
    }

    .t4 {
      animation-delay: 0.6s;
      height: 36px;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes swim {
      0% {
        transform: rotate(-8deg) translateY(0);
      }

      100% {
        transform: rotate(8deg) translateY(-4px);
      }
    }

    h1 {
      font-size: 4rem;
      color: #9d84b7;
      margin: 1rem 0 0.5rem 0;
      font-weight: 800;
    }

    .subtitle {
      font-size: 1.5rem;
      color: #c8b6ff;
      margin-bottom: 1rem;
    }

    p {
      color: #666;
      font-size: 1rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    a {
      background: linear-gradient(135deg, #c8b6ff 0%, #9d84b7 100%);
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      display: inline-block;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(157, 132, 183, 0.3);
    }

    .home-link {
      background: linear-gradient(135deg, #c8b6ff 0%, #9d84b7 100%);
    }

    .back-link {
      background: #e6d9f0;
      color: #9d84b7;
      border: 2px solid #c8b6ff;
    }

    .back-link:hover {
      background: #d9cde6;
    }

    @media (max-width: 600px) {
      .container-error {
        padding: 2rem 1rem;
        margin: 1rem;
      }

      h1 {
        font-size: 3rem;
      }

      .hero-octopus-container {
        transform: scale(0.8);
        margin-bottom: 0;
      }
    }
  </style>
</head>

<body>
  <div class="container-error">

    <div class="hero-octopus-container">
      <div class="octo-head">
        <div class="octo-eye eye-left"></div>
        <div class="octo-eye eye-right"></div>
      </div>
      <div class="octo-tentacles">
        <div class="tentacle t1"></div>
        <div class="tentacle t2"></div>
        <div class="tentacle t3"></div>
        <div class="tentacle t4"></div>
      </div>
    </div>

    <h1>406</h1>
    <div class="subtitle">Not Acceptable!</div>
    <p>Peri doesn't know how to format a response for the exact type of data you requested.</p>

    <div class="button-group">
      <a href="/" class="home-link">Go Home</a>
      <a href="javascript:history.back()" class="back-link">Go Back</a>
    </div>
  </div>
</body>

</html>
